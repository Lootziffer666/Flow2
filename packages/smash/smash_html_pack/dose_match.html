<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dose Match</title>
<style>
:root{
  --bg:#f4efe6;
  --ink:#111;
  --accent:#b72121;
  --muted:#6b635a;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}
body{display:flex;flex-direction:column}
header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(17,17,17,.08)}
h1{font-size:22px;margin:0;letter-spacing:.02em}
small{color:var(--muted)}
main{flex:1;display:grid;place-items:center;padding:18px}
.stage{position:relative;width:min(900px,92vw);height:min(540px,70vh);background:#fff;overflow:hidden;border-radius:24px;box-shadow:0 16px 60px rgba(0,0,0,.12)}
.overlay{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none}
.badge{position:absolute;left:16px;bottom:16px;background:rgba(255,255,255,.82);backdrop-filter: blur(8px);border:1px solid rgba(0,0,0,.08);padding:8px 12px;border-radius:999px;font-size:13px}
button{appearance:none;border:0;border-radius:999px;background:var(--ink);color:white;padding:10px 14px;font-weight:600;cursor:pointer}
button.secondary{background:#e7dfd3;color:var(--ink)}
.controls{display:flex;gap:10px;align-items:center}
.msg{position:absolute;top:16px;left:50%;transform:translateX(-50%);padding:10px 14px;background:rgba(255,255,255,.9);border-radius:999px;border:1px solid rgba(0,0,0,.08);font-weight:600}
svg{display:block;width:100%;height:100%}
a{color:inherit}
</style>
</head>
<body>
<header>
  <div>
    <h1>Dose Match</h1>
    <small>Ordne Last und Träger mit Blick für Größe und Balance zu.</small>
  </div>
  <div class="controls">
    <a href="ui.html"><button class="secondary">Zur UI</button></a>
    <button onclick="location.reload()">Neu starten</button>
  </div>
</header>
<main>
  <div class="stage" id="stage">
    <div class="msg" id="status">Bereit</div>
    <svg id="scene" viewBox="0 0 900 540" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="badge">5–20 Sek. Microgame</div>
  </div>
</main>
<script>
const $ = s => document.querySelector(s);
const stage = $('.stage');
const svg = $('#scene');
const statusEl = $('#status');
function setStatus(t){ if(statusEl) statusEl.textContent=t; }
function rand(a,b){ return Math.random()*(b-a)+a; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }
function celebrate(text='Gut'){ 
  setStatus(text);
  stage.animate([{transform:'scale(1)'},{transform:'scale(1.006)'},{transform:'scale(1)'}],{duration:240});
}


svg.innerHTML=`<rect width="900" height="540" fill="#f4efe6"/>
${[0,1,2].map(i=>`<rect x="${120+i*240}" y="130" width="140" height="80" rx="18" fill="#111"/>
<rect class="dose" data-s="${i+1}" x="${140+i*240}" y="320" width="${40+(i*25)}" height="${100-(i*18)}" rx="10" fill="#b72121"/>`).join('')}
${[0,1,2].map(i=>`<rect class="slot" data-s="${i+1}" x="${150+i*240}" y="140" width="${80+(i*25)}" height="50" rx="10" fill="#d7cdbf" stroke="#111" stroke-width="3"/>`).join('')}`;
setStatus('Bringe jede Dosis zum passenden Träger');
let drag=null, offx=0, offy=0;
const doses=[...svg.querySelectorAll('.dose')];
function pt(e){const r=svg.getBoundingClientRect(); return {x:(e.clientX-r.left)/r.width*900,y:(e.clientY-r.top)/r.height*540};}
doses.forEach(d=>d.onpointerdown=e=>{drag=d; const p=pt(e); offx=+d.getAttribute('x')-p.x; offy=+d.getAttribute('y')-p.y;});
stage.onpointermove=e=>{ if(!drag) return; const p=pt(e); drag.setAttribute('x', p.x+offx); drag.setAttribute('y', p.y+offy);}
stage.onpointerup=e=>{
 if(!drag) return;
 const p=pt(e);
 const slots=[...svg.querySelectorAll('.slot')];
 let snapped=false;
 slots.forEach(s=>{
   const sx=+s.getAttribute('x'), sy=+s.getAttribute('y'), sw=+s.getAttribute('width'), sh=+s.getAttribute('height');
   if(p.x>sx && p.x<sx+sw && p.y>sy && p.y<sy+sh){
      const good=s.dataset.s===drag.dataset.s;
      drag.setAttribute('fill', good?'#111':'#b72121');
      celebrate(good?'Passt':'Nicht die richtige Last');
      drag.setAttribute('x', sx+10); drag.setAttribute('y', sy-30); snapped=true;
   }
 });
 drag=null;
}

</script>
</body>
</html>
