<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cut a Path</title>
<style>
:root{
  --bg:#f4efe6;
  --ink:#111;
  --accent:#b72121;
  --muted:#6b635a;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--ink)}
body{display:flex;flex-direction:column}
header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(17,17,17,.08)}
h1{font-size:22px;margin:0;letter-spacing:.02em}
small{color:var(--muted)}
main{flex:1;display:grid;place-items:center;padding:18px}
.stage{position:relative;width:min(900px,92vw);height:min(540px,70vh);background:#fff;overflow:hidden;border-radius:24px;box-shadow:0 16px 60px rgba(0,0,0,.12)}
.overlay{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none}
.badge{position:absolute;left:16px;bottom:16px;background:rgba(255,255,255,.82);backdrop-filter: blur(8px);border:1px solid rgba(0,0,0,.08);padding:8px 12px;border-radius:999px;font-size:13px}
button{appearance:none;border:0;border-radius:999px;background:var(--ink);color:white;padding:10px 14px;font-weight:600;cursor:pointer}
button.secondary{background:#e7dfd3;color:var(--ink)}
.controls{display:flex;gap:10px;align-items:center}
.msg{position:absolute;top:16px;left:50%;transform:translateX(-50%);padding:10px 14px;background:rgba(255,255,255,.9);border-radius:999px;border:1px solid rgba(0,0,0,.08);font-weight:600}
svg{display:block;width:100%;height:100%}
a{color:inherit}
</style>
</head>
<body>
<header>
  <div>
    <h1>Cut a Path</h1>
    <small>Zeichne einen sicheren Weg nur innerhalb des Lichtkegels.</small>
  </div>
  <div class="controls">
    <a href="ui.html"><button class="secondary">Zur UI</button></a>
    <button onclick="location.reload()">Neu starten</button>
  </div>
</header>
<main>
  <div class="stage" id="stage">
    <div class="msg" id="status">Bereit</div>
    <svg id="scene" viewBox="0 0 900 540" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="badge">5–20 Sek. Microgame</div>
  </div>
</main>
<script>
const $ = s => document.querySelector(s);
const stage = $('.stage');
const svg = $('#scene');
const statusEl = $('#status');
function setStatus(t){ if(statusEl) statusEl.textContent=t; }
function rand(a,b){ return Math.random()*(b-a)+a; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }
function celebrate(text='Gut'){ 
  setStatus(text);
  stage.animate([{transform:'scale(1)'},{transform:'scale(1.006)'},{transform:'scale(1)'}],{duration:240});
}


let drawing=false, points=[];
svg.innerHTML=`<rect width="900" height="540" fill="#111"/>
<g id="trees">${Array.from({length:28},()=>`<rect x="${rand(0,860)}" y="${rand(0,480)}" width="${rand(14,34)}" height="${rand(60,150)}" fill="#191919"/>`).join('')}</g>
<polygon id="light" points="450,40 290,500 610,500" fill="#f4efe6"/>
<path id="trail" d="" stroke="#b72121" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="450" cy="40" r="10" fill="#b72121"/>`;
const trail=document.getElementById('trail');
setStatus('Ziehe einen Pfad nur im Lichtkegel');
function svgPt(e){ const r=svg.getBoundingClientRect(); return {x:(e.clientX-r.left)/r.width*900, y:(e.clientY-r.top)/r.height*540};}
function inTriangle(p){
 const area=(a,b,c)=>Math.abs((a.x*(b.y-c.y)+b.x*(c.y-a.y)+c.x*(a.y-b.y))/2);
 const A={x:450,y:40},B={x:290,y:500},C={x:610,y:500};
 const total=area(A,B,C), a1=area(p,B,C), a2=area(A,p,C), a3=area(A,B,p);
 return Math.abs(total-(a1+a2+a3))<1.5;
}
stage.onpointerdown=e=>{drawing=true; points=[]; stage.setPointerCapture(e.pointerId);}
stage.onpointermove=e=>{
 if(!drawing) return;
 const p=svgPt(e); points.push(p);
 trail.setAttribute('d', 'M'+points.map(p=>`${p.x},${p.y}`).join(' L'));
}
stage.onpointerup=e=>{
 drawing=false;
 const valid = points.length>8 && points.every(inTriangle);
 celebrate(valid?'Pfad gefunden':'Pfad verlassen');
}

</script>
</body>
</html>
