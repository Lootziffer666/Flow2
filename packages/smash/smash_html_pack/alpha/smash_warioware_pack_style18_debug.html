<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>SMASH — Debug Build</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root{
      --teal:#00c0c0; --navy:#000030; --red:#e01020; --cream:#f2f0e8;
      --muted: rgba(0,0,48,.62);
      --shadow: 10px 14px 0 rgba(0,0,48,.22);
      --shadow2: 6px 8px 0 rgba(0,0,48,.18);
      --r-xl: 22px; --r: 16px; --tap: 56px;
      --safe-top: env(safe-area-inset-top); --safe-bot: env(safe-area-inset-bottom);
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html,body{ height:100%; }
    body{ margin:0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: var(--teal); color: var(--navy); overflow:hidden; }
    .app{ position:relative; z-index:1; height:100%; display:flex; flex-direction:column; padding: calc(14px + var(--safe-top)) 14px calc(14px + var(--safe-bot)) 14px; gap:12px; }
    .topbar{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px; border:2px solid var(--navy); border-radius: var(--r-xl); background: var(--cream); box-shadow: var(--shadow2); }
    .brand .name{ font-family:"Bebas Neue"; font-size:18px; letter-spacing:.18em; text-transform:uppercase; }
    .brand .tag{ font-size:12px; color:var(--muted); font-weight:800; }
    .right{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    button{ appearance:none; border:0; background:none; color:inherit; font:inherit; }
    .btn{ height:42px; padding:0 12px; border-radius:999px; border:2px solid var(--navy); background:#fff; box-shadow:4px 6px 0 rgba(0,0,48,.18); font-weight:1000; font-size:12px; cursor:pointer; user-select:none; touch-action: manipulation; }
    .btn:active{ transform: translate(2px,2px); box-shadow:2px 3px 0 rgba(0,0,48,.18); }
    .btn.primary{ background: var(--red); color:#fff; }
    .btn.pill{ background: var(--navy); color:#fff; }
    .btn.pill.bad{ background: var(--red); }
    .panel{ flex:1; min-height:0; border-radius: var(--r-xl); background: var(--cream); border:2px solid var(--navy); box-shadow: var(--shadow); overflow:hidden; display:flex; flex-direction:column; }
    .panel-header{ padding:14px; border-bottom:2px solid var(--navy); display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .title h1{ margin:0; font-family:"Bebas Neue"; font-size:22px; letter-spacing:.10em; text-transform:uppercase; }
    .title p{ margin:0; font-size:12px; color:var(--muted); font-weight:800; }
    .meta{ display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .pill{ font-size:11px; border:2px solid var(--navy); border-radius:999px; padding:6px 10px; background:#fff; font-weight:900; color:var(--muted); }
    .content{ flex:1; min-height:0; padding:14px; display:flex; flex-direction:column; gap:12px; overflow:auto; -webkit-overflow-scrolling:touch; }
    .card{ border:2px solid var(--navy); border-radius: var(--r); padding:14px; background:#fff; box-shadow: var(--shadow2); display:flex; flex-direction:column; gap:10px; }
    .card h2{ margin:0; font-family:"Bebas Neue"; font-size:18px; letter-spacing:.08em; text-transform:uppercase; }
    .card p{ margin:0; font-size:12px; color:var(--muted); font-weight:800; }
    .divider{ height:2px; background: rgba(0,0,48,.14); }
    .stage{ flex:1; min-height: 440px; border-radius: var(--r-xl); border:2px solid var(--navy); background:#fff; box-shadow: var(--shadow2); padding:12px; display:flex; flex-direction:column; gap:10px; position:relative; overflow:hidden; }
    .hud{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    .prompt{ font-family:"Bebas Neue"; font-size:26px; letter-spacing:.18em; text-transform:uppercase; }
    .bar{ flex:1 1 160px; height:10px; border-radius:999px; background: rgba(0,0,48,.12); border:2px solid var(--navy); overflow:hidden; min-width:160px; }
    .bar>div{ height:100%; width:100%; background: linear-gradient(90deg, rgba(0,192,192,.35), rgba(224,16,32,.30)); transform-origin:left center; transform: scaleX(1); transition: transform .06s linear; }
    .arena{ position:relative; flex:1; border-radius: var(--r); background:#fff; border:2px solid var(--navy); box-shadow:4px 6px 0 rgba(0,0,48,.18); overflow:hidden; touch-action:none; }
    .overlayErr{ position:fixed; left:12px; right:12px; bottom:12px; z-index:9999; border:2px solid #fff; border-radius:18px; background: rgba(224,16,32,.92); color:#fff; padding:12px; font-weight:800; display:none; }
    .overlayErr pre{ margin:8px 0 0 0; white-space:pre-wrap; font-size:11px; line-height:1.2; }
  </style>
</head>
<body>
  <div id="err" class="overlayErr"></div>

  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="name">SMASH</div>
        <div class="tag" id="tagline">DEBUG BUILD — zeigt Fehler an, wenn was crasht.</div>
      </div>
      <div class="right">
        <button class="btn" id="btn-home">Home</button>
        <button class="btn" id="btn-practice">Üben</button>
        <button class="btn primary" id="btn-run">Run</button>
        <button class="btn pill" id="pill-js">JS?</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="title">
          <h1 id="h1">Home</h1>
          <p id="hsub">Wenn das leer bleibt: JS crasht oder wird geblockt.</p>
        </div>
        <div class="meta">
          <div class="pill" id="pill-mode">Modus: Home</div>
          <div class="pill" id="pill-streak">Streak: 0</div>
          <div class="pill" id="pill-miss">Miss: 0</div>
        </div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>

<script>
  // Debug: if we got here, JS is executing.
  (function(){
    var p = document.getElementById('pill-js');
    if (p) p.textContent = 'JS ✅';
  })();
</script>

<script>

  function showErr(title, detail){

      errBox.querySelector("pre").textContent = String(detail || "");
      const pill = document.getElementById("pill-js");
      if (pill) {
        pill.textContent = "ERR!";

        pill.style.color = "#fff";

  function decodePack(){
    const bin = atob(PACK_B64);
    const bytes = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    return JSON.parse(new TextDecoder("utf-8").decode(bytes));
  }

  function randToken(){ return Math.random().toString(16).slice(2) + Math.random().toString(16).slice(2); }
  function vibrate(ms=12){ try{ if (navigator.vibrate) navigator.vibrate(ms); }catch(_){} }
  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;" }[c])); }

  function setHeader(title, sub){
    document.getElementById("h1").textContent = title;
    document.getElementById("hsub").textContent = sub;
    document.getElementById("pill-mode").textContent = "Modus: " + (state.mode === "run" ? "Run" : state.mode === "practice" ? "Üben" : "Home");
    document.getElementById("pill-streak").textContent = "Streak: " + state.streak;
    document.getElementById("pill-miss").textContent = "Miss: " + state.miss;
  }

  function clearContent(){
    const c = document.getElementById("content");
    c.innerHTML = "";
    c.scrollTop = 0;
  }

  function stopTimers(){
    if (state.timer) { clearTimeout(state.timer); state.timer = null; }
    if (state.tick) { clearInterval(state.tick); state.tick = null; }
    if (state.autoNext) { clearTimeout(state.autoNext); state.autoNext = null; }
  }

  function renderHome(){
    stopTimers();
    state.mode = "home";
    clearContent();
    setHeader("Home", "Wenn du jetzt Cards siehst, läuft JS.");

    const c = document.getElementById("content");
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `

  function renderPractice(){
    stopTimers();
    state.mode = "practice";
    clearContent();
    setHeader("Üben", "Tippe ein Spiel.");

    const c = document.getElementById("content");
    const list = ALL_GAMES.slice(0, 10);

      card.className = "card";
      card.style.cursor = "pointer";
      card.innerHTML = `<h2>${escapeHtml(g.title)}</h2><p>${escapeHtml(g.prompt || "")}</p>`;

      c.appendChild(card);
    }
  }

  function startRun(){

    state.miss = 0;
    state.limitMs = state.baseLimitMs;

    `;

      arena,
      mode: state.mode,
      token: state.roundToken,
      ok: () => resolveRound(true),
      miss: () => resolveRound(false),
      prompt: (t) => { document.getElementById("prompt").textContent = t; },
      vibrate
    };

    game.render(api);

    startTimer(barFill, state.mode === "run" ? state.limitMs : state.baseLimitMs, () => resolveRound(false));
  }

  function startTimer(barFill, durationMs, onTimeout){
    const start = performance.now();
    state.tick = setInterval(() => {
      const p = clamp(1 - ((performance.now() - start) / durationMs), 0, 1);
      barFill.style.transform = `scaleX(${p})`;
    }, 30);

    state.timer = setTimeout(() => {
      stopTimers();
      onTimeout();
    }, durationMs);
  }

  function resolveRound(ok){
    if (state.locked) return;
    state.locked = true;
    stopTimers();
    if (ok) state.streak += 1;
    else state.miss += 1;

    // quick loop for debug
    setTimeout(() => {
      if (state.mode === "run" && state.miss < 3) startRound({ forced: null });
      else renderHome();
    }, 350);
  }

  function renderPack(api, game){
    const iframe = document.createElement("iframe");
    iframe.style.position = "absolute";
    iframe.style.inset = "0";
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "0";
    iframe.setAttribute("sandbox", "allow-scripts allow-same-origin");
    iframe.srcdoc = String(game.srcdoc || "").replaceAll("__SMASH_TOKEN__", api.token);
    api.arena.appendChild(iframe);

    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type !== "smash_done") return;
      if (d.token !== api.token) return;
      window.removeEventListener("message", onMsg);
      api.ok();
    };
    window.addEventListener("message", onMsg);
  }

  // --- Core gestures
  function svgEl(tag, attrs={}){
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, String(v));
    return el;
  }

  function renderMash(api, opts){
    const tapsNeeded = opts?.taps ?? 12;
    let taps = 0;

    const svg = svgEl("svg", { viewBox:"0 0 900 540", width:"100%", height:"100%", preserveAspectRatio:"xMidYMid slice" });
    svg.appendChild(svgEl("rect", { x:0, y:0, width:900, height:540, fill:"#f2f0e8" }));
    svg.appendChild(svgEl("polygon", { points:"0,0 900,0 900,380 0,260", fill:"#00c0c0" }));
    svg.appendChild(svgEl("polygon", { points:"0,330 900,210 900,260 0,380", fill:"#e01020" }));
    const btn = svgEl("circle", { cx:450, cy:320, r:120, fill:"#fff", stroke:"#000030", "stroke-width":12 });
    const txt = svgEl("text", { x:450, y:335, "text-anchor":"middle", "font-family":"Bebas Neue", "font-size":60, "letter-spacing":"0.18em", fill:"#000030" });
    txt.textContent = opts?.label || "MASH";
    const gaugeBg = svgEl("rect", { x:200, y:430, width:500, height:26, rx:13, fill:"#fff", stroke:"#000030", "stroke-width":10 });
    const gauge = svgEl("rect", { x:206, y:436, width:0, height:14, rx:7, fill:"#e01020" });
    svg.appendChild(gaugeBg); svg.appendChild(gauge); svg.appendChild(btn); svg.appendChild(txt);
    api.arena.appendChild(svg);

    api.arena.addEventListener("pointerdown", () => {
      taps++;
      api.vibrate(8);
      gauge.setAttribute("width", String(Math.min(488, Math.round(488*(taps/tapsNeeded)))));
      if (taps >= tapsNeeded) api.ok();
    }, { passive:true });
  }

  function renderPull(api){
    let done=false;
    const svg = svgEl("svg", { viewBox:"0 0 900 540", width:"100%", height:"100%", preserveAspectRatio:"xMidYMid slice" });
    svg.appendChild(svgEl("rect", { x:0, y:0, width:900, height:540, fill:"#f2f0e8" }));
    svg.appendChild(svgEl("rect", { x:0, y:0, width:900, height:200, fill:"#00c0c0" }));
    const track = svgEl("rect", { x:140, y:360, width:620, height:34, rx:17, fill:"#fff", stroke:"#000030", "stroke-width":10 });
    const handle = svgEl("circle", { cx:160, cy:377, r:34, fill:"#e01020", stroke:"#000030", "stroke-width":10 });
    svg.appendChild(track); svg.appendChild(handle);
    api.arena.appendChild(svg);

    let isDown=false, sx=0, start=160;
    api.arena.addEventListener("pointerdown",(e)=>{isDown=true; sx=e.clientX; start=parseFloat(handle.getAttribute("cx")||"160"); api.arena.setPointerCapture(e.pointerId);});
    api.arena.addEventListener("pointermove",(e)=>{
      if(!isDown||done) return;
      const r=api.arena.getBoundingClientRect();
      const dx=(e.clientX-sx)/r.width*900;
      const cx=Math.max(160, Math.min(740, start+dx));
      handle.setAttribute("cx", String(cx));
      if(cx>=700 && !done){ done=true; api.ok(); }
    });
    api.arena.addEventListener("pointerup",()=>{isDown=false;});
    api.arena.addEventListener("pointercancel",()=>{isDown=false;});
  }

  function renderSwipeCheckpoints(api){
    let done=false;
    const pts=[{x:150,y:360},{x:260,y:300},{x:370,y:250},{x:480,y:210},{x:600,y:190},{x:720,y:170}];
    let idx=0;

    const svg = svgEl("svg", { viewBox:"0 0 900 540", width:"100%", height:"100%", preserveAspectRatio:"xMidYMid slice" });
    svg.appendChild(svgEl("rect", { x:0, y:0, width:900, height:540, fill:"#f2f0e8" }));
    svg.appendChild(svgEl("path", { d:"M80 420 C 220 260, 380 240, 520 200 C 650 165, 740 150, 820 120", fill:"none", stroke:"#000030", "stroke-width":18, "stroke-linecap":"round" }));
    const dots = pts.map(p=>{ const c=svgEl("circle", {cx:p.x, cy:p.y, r:18, fill:"#fff", stroke:"#000030", "stroke-width":8}); svg.appendChild(c); return c; });
    api.arena.appendChild(svg);

    function toSvg(e){
      const r=api.arena.getBoundingClientRect();
      return { x:(e.clientX-r.left)/r.width*900, y:(e.clientY-r.top)/r.height*540 };
    }

    let active=false;
    api.arena.addEventListener("pointerdown",(e)=>{ if(done) return; active=true; idx=0; dots.forEach(d=>d.setAttribute("fill","#fff")); api.arena.setPointerCapture(e.pointerId); const p=toSvg(e); hit(p.x,p.y); });
    api.arena.addEventListener("pointermove",(e)=>{ if(!active||done) return; const p=toSvg(e); hit(p.x,p.y); });
    api.arena.addEventListener("pointerup",()=>{active=false;});
    api.arena.addEventListener("pointercancel",()=>{active=false;});

    function hit(x,y){
      const t=pts[idx];
      const dx=x-t.x, dy=y-t.y;
      if(dx*dx+dy*dy<=40*40){
        dots[idx].setAttribute("fill","#e01020");
        idx++;
        api.vibrate(10);
        if(idx>=pts.length && !done){ done=true; api.ok(); }
      }
    }
  }

  // Wire nav buttons
  document.getElementById("btn-home").addEventListener("click", renderHome);
  document.getElementById("btn-practice").addEventListener("click", renderPractice);
  document.getElementById("btn-run").addEventListener("click", startRun);

  // Boot
  renderHome();
})();
</script>
</body>
</html>
